  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; background: #0f0f1a; }

    #sidebar {
      width: 260px;
      background: #0f0f1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-right: 1px solid #1e1e30;
    }

    #sidebar-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid #1e1e30;
    }

    #sidebar-header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f8a845;
      line-height: 1.35;
      letter-spacing: -0.2px;
    }

    #sidebar-header p {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    #search {
      padding: 10px 12px;
      border-bottom: 1px solid #1e1e30;
    }

    #search input {
      width: 100%;
      padding: 7px 10px;
      background: #16162a;
      border: 1px solid #252540;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    #search input:focus { border-color: #f8a845; }
    #search input::placeholder { color: #444; }

    #bairros { padding: 12px; flex: 1; overflow-y: auto; }

    #bairros h3 {
      font-size: 10px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .bairro-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 8px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #bbb;
      font-size: 12px;
      text-align: left;
      transition: background 0.12s, color 0.12s;
      margin-bottom: 2px;
    }

    .bairro-btn:hover { background: #16162a; color: #f8a845; }

    .bairro-btn.active {
      background: #1e1505;
      color: #f8a845;
      font-weight: 600;
    }

    .bairro-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #f8a845;
      flex-shrink: 0;
    }

    .bairro-count {
      margin-left: auto;
      font-size: 11px;
      color: #444;
    }

    .bairro-btn.active .bairro-count { color: #c07a1a; }

    #footer {
      padding: 10px 12px;
      border-top: 1px solid #1e1e30;
      font-size: 11px;
      color: #444;
    }

    #footer span { color: #f8a845; font-weight: 600; }

    #map { flex: 1; }

    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      padding: 0;
      overflow: hidden;
    }

    .leaflet-popup-content { margin: 0; }

    .popup-header {
      background: #f8a845;
      padding: 10px 14px 8px;
    }

    .popup-name {
      font-weight: 700;
      font-size: 13px;
      color: #1a0f00;
      line-height: 1.3;
    }

    .popup-bairro {
      font-size: 10px;
      color: rgba(26,15,0,0.65);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .popup-body {
      padding: 10px 14px 12px;
      background: white;
    }

    .popup-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      font-size: 12px;
      color: #333;
      margin-top: 6px;
      line-height: 1.4;
    }

    .popup-row:first-child { margin-top: 0; }

    .popup-icon { font-size: 13px; flex-shrink: 0; margin-top: 0px; }
  </style>
</head>

const map = L.map('map', { zoomControl: false }).setView([-23.565, -46.695], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap · © CARTO',
  maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// ── Orange pin icon ────────────────────────────────────────────────────────────
function makeIcon(color) {
  color = color || '#f8a845';
  const stroke = color === '#f8a845' ? '#c47a1a' : '#0008';
  return L.divIcon({
    className: '',
    html: `<svg width="28" height="40" viewBox="0 0 28 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 1C7.1 1 1.5 6.6 1.5 13.5C1.5 23.2 14 39 14 39S26.5 23.2 26.5 13.5C26.5 6.6 20.9 1 14 1Z"
        fill="${color}" stroke="${stroke}" stroke-width="1.5"/>
      <circle cx="14" cy="13.5" r="5" fill="white" opacity="0.95"/>
    </svg>`,
    iconSize: [28, 40],
    iconAnchor: [14, 40],
    popupAnchor: [0, -42]
  });
}

const defaultIcon = makeIcon('#f8a845');

// ── Build markers ──────────────────────────────────────────────────────────────
const markers = locations.map(loc => {
  const marker = L.marker([loc.lat, loc.lng], { icon: defaultIcon });
  marker.bindPopup(`
    <div style="min-width:210px; font-family:-apple-system,'Segoe UI',sans-serif;">
      <div class="popup-header">
        <div class="popup-name">${loc.name}</div>
        <div class="popup-bairro">${loc.bairro}</div>
      </div>
      <div class="popup-body">
        <div class="popup-row"><span class="popup-icon">📍</span><span>${loc.address}, ${loc.bairro}, São Paulo</span></div>
        <div class="popup-row"><span class="popup-icon">📞</span><span>${loc.tel}</span></div>
      </div>
    </div>
  `, { maxWidth: 280 });
  marker._locData = loc;
  return marker;
});

const layerGroup = L.layerGroup(markers).addTo(map);

// ── Sidebar: bairros ───────────────────────────────────────────────────────────
const bairros = [...new Set(locations.map(l => l.bairro))];
const bairroList = document.getElementById('bairro-list');
let activeBairro = null;

const allBtn = document.createElement('button');
allBtn.className = 'bairro-btn active';
allBtn.innerHTML = `<span class="bairro-dot"></span> Todos <span class="bairro-count">${locations.length}</span>`;
allBtn.addEventListener('click', () => {
  activeBairro = null;
  applyFilters();
  document.querySelectorAll('.bairro-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
});
bairroList.appendChild(allBtn);

bairros.forEach(bairro => {
  const count = locations.filter(l => l.bairro === bairro).length;
  const btn = document.createElement('button');
  btn.className = 'bairro-btn';
  btn.innerHTML = `<span class="bairro-dot"></span> ${bairro} <span class="bairro-count">${count}</span>`;
  btn.addEventListener('click', () => {
    activeBairro = bairro;
    applyFilters();
    document.querySelectorAll('.bairro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  bairroList.appendChild(btn);
});

// ── Search ─────────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', applyFilters);

function applyFilters() {
  const term = document.getElementById('search-input').value.trim().toLowerCase();
  let visible = 0;

  layerGroup.clearLayers();

  markers.forEach(marker => {
    const loc = marker._locData;
    const matchSearch = !term ||
      loc.name.toLowerCase().includes(term) ||
      loc.address.toLowerCase().includes(term) ||
      loc.bairro.toLowerCase().includes(term);
    const matchBairro = !activeBairro || loc.bairro === activeBairro;

    if (matchSearch && matchBairro) {
      layerGroup.addLayer(marker);
      visible++;
    }
  });

  document.getElementById('visible-count').textContent = visible;
}

// ── Fit map to active bairro when filtered ────────────────────────────────────
document.querySelectorAll('.bairro-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (activeBairro) {
      const pts = markers
        .filter(m => m._locData.bairro === activeBairro)
        .map(m => m.getLatLng());
      if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.25));
    } else {
      map.setView([-23.565, -46.695], 13);
    }
  });
});
</script>
</body>
</html>
