<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Corretores — São Paulo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/osmtogeojson@3.0.0-beta.4/osmtogeojson.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; background: #0f0f1a; }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      background: #0f0f1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-right: 1px solid #1e1e30;
    }

    #sidebar-header { padding: 16px 16px 12px; border-bottom: 1px solid #1e1e30; }
    #sidebar-header h1 { font-size: 14px; font-weight: 700; color: #f8a845; line-height: 1.35; }
    #sidebar-header p  { font-size: 11px; color: #555; margin-top: 3px; }

    /* Search */
    #search { padding: 9px 12px; border-bottom: 1px solid #1e1e30; }
    #search input {
      width: 100%; padding: 7px 10px;
      background: #16162a; border: 1px solid #252540; border-radius: 6px;
      color: #e0e0e0; font-size: 12px; outline: none; transition: border-color 0.15s;
    }
    #search input:focus { border-color: #f8a845; }
    #search input::placeholder { color: #444; }

    /* Zone map toggle */
    #zone-toggle { padding: 9px 12px; border-bottom: 1px solid #1e1e30; }
    #zone-toggle button {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 6px 8px; border-radius: 6px; cursor: pointer;
      border: 1px solid #252540; background: #16162a;
      color: #bbb; font-size: 12px; transition: all 0.12s;
    }
    #zone-toggle button.active { border-color: #f8a845; color: #f8a845; background: #1e1505; }

    /* Zone tabs */
    #zone-tabs {
      display: flex; overflow-x: auto; border-bottom: 1px solid #1e1e30;
      scrollbar-width: none; flex-shrink: 0;
    }
    #zone-tabs::-webkit-scrollbar { display: none; }
    .ztab {
      flex: 1; min-width: 0; padding: 8px 4px; border: none;
      background: transparent; color: #555; font-size: 10px; font-weight: 700;
      cursor: pointer; border-bottom: 2px solid transparent;
      text-transform: uppercase; letter-spacing: 0.4px;
      white-space: nowrap; transition: all 0.15s;
    }
    .ztab:hover { color: #aaa; }
    .ztab.active { border-bottom-color: var(--zc); color: var(--zc); }

    /* Bairro list */
    #bairros { flex: 1; overflow-y: auto; padding: 8px 12px; }
    #zone-label {
      font-size: 10px; color: #444; text-transform: uppercase;
      letter-spacing: 1.2px; margin-bottom: 6px; padding-left: 4px; display: block;
    }

    .bairro-btn {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 6px 8px; border-radius: 6px; cursor: pointer;
      border: none; background: transparent; color: #bbb;
      font-size: 12px; text-align: left; transition: background 0.12s, color 0.12s;
      margin-bottom: 2px;
    }
    .bairro-btn:hover { background: #16162a; color: #e0e0e0; }
    .bairro-btn.active { background: #16162a; color: #fff; font-weight: 600; }
    .bairro-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .bairro-count { margin-left: auto; font-size: 11px; color: #444; }
    .bairro-btn.active .bairro-count { color: #888; }

    /* Legend */
    #legend {
      padding: 8px 12px; border-top: 1px solid #1e1e30;
      display: flex; gap: 14px; flex-shrink: 0;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Footer */
    #footer { padding: 8px 12px; border-top: 1px solid #1e1e30; font-size: 11px; color: #444; flex-shrink: 0; }
    #footer span { color: #f8a845; font-weight: 600; }

    /* Map */
    #map { flex: 1; }

    /* Popup */
    .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,0.18); padding: 0; overflow: hidden; }
    .leaflet-popup-content { margin: 0; }
    .popup-header { padding: 10px 14px 8px; }
    .popup-name  { font-weight: 700; font-size: 13px; line-height: 1.3; }
    .popup-bairro { font-size: 10px; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .popup-body  { padding: 10px 14px 12px; background: white; }
    .popup-row   { display: flex; align-items: flex-start; gap: 7px; font-size: 12px; color: #333; margin-top: 5px; line-height: 1.4; }
    .popup-row:first-child { margin-top: 0; }
    .popup-icon  { font-size: 13px; flex-shrink: 0; }

    /* Status filter */
    #status-filter { padding: 8px 12px; border-bottom: 1px solid #1e1e30; display: flex; gap: 6px; }
    .sfilter-btn {
      flex: 1; padding: 5px 4px; border-radius: 6px; border: 1px solid #252540;
      background: #16162a; color: #666; font-size: 11px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 5px; transition: all 0.14s;
    }
    .sfilter-btn:hover { color: #aaa; border-color: #333; }
    .sfilter-btn.active-all      { border-color: #f8a845; color: #f8a845; background: #1e1505; }
    .sfilter-btn.active-explored { border-color: #FF6633; color: #FF6633; background: #1e0f00; }
    .sfilter-btn.active-unexplored { border-color: #5a7a9a; color: #8ab4cc; background: #0d1520; }
    .sfilter-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Zone labels on map */
    .zone-label {
      background: transparent; border: none; font-size: 11px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.55); text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      white-space: nowrap; pointer-events: none;
    }

    /* ── Mobile handle (hidden on desktop) ── */
    #mobile-handle { display: none; }

    /* ── Mobile layout (≤ 640 px) ── */
    @media (max-width: 640px) {
      body {
        flex-direction: column;
        overflow: hidden;
        position: fixed;
        inset: 0;
      }

      #map {
        position: fixed;
        inset: 0;
        z-index: 1;
      }

      #sidebar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100%;
        max-height: 72vh;
        border-right: none;
        border-top: 1px solid #2a2a40;
        border-radius: 16px 16px 0 0;
        z-index: 500;
        transform: translateY(calc(100% - 60px));
        transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        overflow: hidden;
        box-shadow: 0 -6px 28px rgba(0,0,0,0.5);
      }

      #sidebar.open { transform: translateY(0); }

      #mobile-handle {
        display: flex;
        justify-content: center;
        padding: 10px 0 6px;
        cursor: pointer;
        flex-shrink: 0;
        background: #0f0f1a;
      }

      #mobile-handle::before {
        content: '';
        width: 36px;
        height: 4px;
        background: #333;
        border-radius: 2px;
      }

      #sidebar-header { cursor: pointer; padding-top: 6px; }

      /* Larger touch targets */
      .bairro-btn { padding: 10px 8px; font-size: 13px; min-height: 42px; }
      .sfilter-btn { padding: 9px 4px; min-height: 40px; font-size: 12px; }
      .ztab { padding: 10px 6px; font-size: 11px; min-height: 40px; }
      #search input { padding: 9px 12px; font-size: 14px; }

      /* Move zoom controls above the collapsed panel */
      .leaflet-bottom.leaflet-right { bottom: 72px !important; }
    }
  </style>
</head>

</div>

// ── Pin icons ──────────────────────────────────────────────────────────────────
function makeIcon(color) {
  const dark = parseInt(color.slice(1), 16) < 0x808080;
  const stroke = dark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.25)';
  return L.divIcon({
    className: '',
    html: `<svg width="28" height="40" viewBox="0 0 28 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 1C7.1 1 1.5 6.6 1.5 13.5C1.5 23.2 14 39 14 39S26.5 23.2 26.5 13.5C26.5 6.6 20.9 1 14 1Z"
        fill="${color}" stroke="${stroke}" stroke-width="1.5"/>
      <circle cx="14" cy="13.5" r="5" fill="white" opacity="0.9"/>
    </svg>`,
    iconSize: [28, 40], iconAnchor: [14, 40], popupAnchor: [0, -42]
  });
}

const ICON_UNEXPLORED = makeIcon('#262D3B');
const ICON_EXPLORED   = makeIcon('#FF6633');

// ── Build markers ──────────────────────────────────────────────────────────────
const markers = locations.map(loc => {
  const icon = loc.explored ? ICON_EXPLORED : ICON_UNEXPLORED;
  const headerBg   = loc.explored ? '#FF6633' : '#262D3B';
  const nameColor  = loc.explored ? '#1a0f00' : '#ffffff';
  const bairroColor= loc.explored ? 'rgba(26,15,0,0.6)' : 'rgba(255,255,255,0.6)';

  const marker = L.marker([loc.lat, loc.lng], { icon });
  marker.bindPopup(`
    <div style="min-width:210px;font-family:-apple-system,'Segoe UI',sans-serif;">
      <div class="popup-header" style="background:${headerBg}">
        <div class="popup-name" style="color:${nameColor}">${loc.name}</div>
        <div class="popup-bairro" style="color:${bairroColor}">${loc.bairro}</div>
      </div>
      <div class="popup-body">
        <div class="popup-row"><span class="popup-icon">📍</span><span>${loc.address}, ${loc.bairro}, São Paulo</span></div>
        ${loc.tel ? `<div class="popup-row"><span class="popup-icon">📞</span><span>${loc.tel}</span></div>` : ''}
        ${loc.note ? `<div class="popup-row"><span class="popup-icon">📝</span><span>${loc.note}</span></div>` : ''}
      </div>
    </div>
  `, { maxWidth: 280 });
  marker._locData = loc;
  return marker;
});

const layerGroup = L.layerGroup(markers).addTo(map);

// ── State ──────────────────────────────────────────────────────────────────────
let activeZone   = 'all';
let activeBairro = null;
let activeStatus = 'all'; // 'all' | 'explored' | 'unexplored'

// ── Status filter buttons ──────────────────────────────────────────────────────
document.querySelectorAll('.sfilter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeStatus = btn.dataset.status;
    document.querySelectorAll('.sfilter-btn').forEach(b => {
      b.className = 'sfilter-btn';
    });
    if (activeStatus === 'all')        btn.classList.add('active-all');
    else if (activeStatus === 'explored')   btn.classList.add('active-explored');
    else                                    btn.classList.add('active-unexplored');
    renderBairroList();
    applyFilters();
  });
});

// ── Zone tabs ──────────────────────────────────────────────────────────────────
const zoneTabsEl = document.getElementById('zone-tabs');

ZONE_TABS.forEach(z => {
  const total = z.id === 'all'
    ? locations.length
    : locations.filter(l => BAIRRO_TO_ZONE[l.bairro] === z.id).length;

  const btn = document.createElement('button');
  btn.className = 'ztab' + (z.id === 'all' ? ' active' : '');
  btn.style.setProperty('--zc', z.color);
  btn.dataset.zone = z.id;
  btn.title = `${z.label} (${total})`;
  btn.textContent = z.label;

  btn.addEventListener('click', () => {
    activeZone   = z.id;
    activeBairro = null;
    document.querySelectorAll('.ztab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderBairroList();
    applyFilters();
    fitZone();
  });

  zoneTabsEl.appendChild(btn);
});

// ── Bairro list ────────────────────────────────────────────────────────────────
function renderBairroList() {
  const list    = document.getElementById('bairro-list');
  const label   = document.getElementById('zone-label');
  list.innerHTML = '';

  const tab = ZONE_TABS.find(z => z.id === activeZone);
  label.textContent = tab ? tab.label : 'Bairros';
  label.style.color = tab ? tab.color : '#444';

  // Which bairros to show
  const allBairros = [...new Set(locations.map(l => l.bairro))];
  const bairros = activeZone === 'all'
    ? allBairros
    : allBairros.filter(b => BAIRRO_TO_ZONE[b] === activeZone);

  if (bairros.length === 0) {
    list.innerHTML = '<p style="font-size:11px;color:#444;padding:8px 4px">Nenhum bairro nesta zona</p>';
    return;
  }

  const matchesStatus = l => activeStatus === 'all' || (activeStatus === 'explored' ? l.explored : !l.explored);

  // "Todos" row
  const totalVisible = locations.filter(l =>
    (activeZone === 'all' || BAIRRO_TO_ZONE[l.bairro] === activeZone) && matchesStatus(l)
  ).length;

  const allRow = document.createElement('button');
  allRow.className = 'bairro-btn' + (!activeBairro ? ' active' : '');
  allRow.innerHTML = `<span class="bairro-dot" style="background:${tab ? tab.color : '#f8a845'}"></span> Todos <span class="bairro-count">${totalVisible}</span>`;
  allRow.addEventListener('click', () => {
    activeBairro = null;
    renderBairroList();
    applyFilters();
    fitZone();
  });
  list.appendChild(allRow);

  bairros.forEach(bairro => {
    const count = locations.filter(l => l.bairro === bairro && matchesStatus(l)).length;
    if (count === 0) return;
    const zoneColor = ZONE_TABS.find(z => z.id === (BAIRRO_TO_ZONE[bairro] || 'all'))?.color || '#f8a845';
    const row = document.createElement('button');
    row.className = 'bairro-btn' + (activeBairro === bairro ? ' active' : '');
    row.innerHTML = `<span class="bairro-dot" style="background:${zoneColor}"></span> ${bairro} <span class="bairro-count">${count}</span>`;
    row.addEventListener('click', () => {
      activeBairro = bairro;
      renderBairroList();
      applyFilters();
      fitBairro(bairro);
    });
    list.appendChild(row);
  });
}

// ── Filters ────────────────────────────────────────────────────────────────────
function applyFilters() {
  const term = document.getElementById('search-input').value.trim().toLowerCase();
  let visible = 0;
  layerGroup.clearLayers();

  markers.forEach(marker => {
    const loc = marker._locData;
    const matchSearch  = !term || loc.name.toLowerCase().includes(term) || loc.address.toLowerCase().includes(term) || loc.bairro.toLowerCase().includes(term);
    const matchZone    = activeZone === 'all' || BAIRRO_TO_ZONE[loc.bairro] === activeZone;
    const matchBairro  = !activeBairro || loc.bairro === activeBairro;
    const matchStatus  = activeStatus === 'all' || (activeStatus === 'explored' ? loc.explored : !loc.explored);
    if (matchSearch && matchZone && matchBairro && matchStatus) { layerGroup.addLayer(marker); visible++; }
  });

  document.getElementById('visible-count').textContent = visible;
}

function fitZone() {
  const pts = markers
    .filter(m => activeZone === 'all' || BAIRRO_TO_ZONE[m._locData.bairro] === activeZone)
    .map(m => m.getLatLng());
  if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.2));
  else map.setView([-23.565, -46.695], 13);
}

function fitBairro(bairro) {
  const pts = markers.filter(m => m._locData.bairro === bairro).map(m => m.getLatLng());
  if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.3));
}

document.getElementById('search-input').addEventListener('input', () => {
  activeBairro = null;
  activeZone   = 'all';
  document.querySelectorAll('.ztab').forEach(b => b.classList.toggle('active', b.dataset.zone === 'all'));
  renderBairroList();
  applyFilters();
});

const zoneLayer = L.layerGroup();
let zonesVisible = false, zonesLoaded = false;

async function loadZones() {
  const btn = document.getElementById('btn-zonas');
  const span = btn.querySelector('span');
  span.textContent = 'Carregando...';
  btn.disabled = true;
  try {
    let osmData;
    const cached = localStorage.getItem('sp_districts_osm_v2');
    if (cached) { osmData = JSON.parse(cached); }
    else {
      const q = `[out:json][timeout:120];relation(298285);map_to_area->.sp;relation["boundary"="administrative"](area.sp)["admin_level"="9"];out geom qt;`;
      const r = await fetch('https://overpass-api.de/api/interpreter', { method:'POST', body:'data='+encodeURIComponent(q), headers:{'Content-Type':'application/x-www-form-urlencoded'} });
      osmData = await r.json();
      localStorage.setItem('sp_districts_osm_v2', JSON.stringify(osmData));
    }
    const geojson = osmtogeojson(osmData);
    const byZone = {};
    geojson.features.forEach(f => {
      if (f.geometry && (f.geometry.type==='Polygon'||f.geometry.type==='MultiPolygon')) {
        const zone = DISTRICT_ZONES[f.properties.name||''];
        if (zone) { (byZone[zone]=byZone[zone]||[]).push(f); }
      }
    });
    Object.entries(byZone).forEach(([zone, features]) => {
      let merged = features[0];
      for (let i=1;i<features.length;i++) try { merged=turf.union(merged,features[i]); } catch(e) {}
      if (!merged) return;
      const color = ZONE_COLORS[zone];
      L.geoJSON(merged,{style:{color,weight:2.5,dashArray:'10,7',fillColor:color,fillOpacity:0.07,interactive:false},interactive:false}).addTo(zoneLayer);
      try {
        const c = turf.centroid(merged).geometry.coordinates;
        L.marker([c[1],c[0]],{icon:L.divIcon({className:'zone-label',html:ZONE_LABELS[zone],iconAnchor:[50,8],iconSize:[100,16]}),interactive:false}).addTo(zoneLayer);
      } catch(e) {}
    });
    zonesLoaded = true;
  } catch(e) { span.textContent='Erro'; btn.disabled=false; return; }
  zoneLayer.addTo(map); zonesVisible=true;
  btn.classList.add('active'); span.textContent='Ocultar zonas'; btn.disabled=false;
}

document.getElementById('btn-zonas').addEventListener('click', () => {
  if (!zonesLoaded) { loadZones(); return; }
  zonesVisible = !zonesVisible;
  const btn=document.getElementById('btn-zonas'), span=btn.querySelector('span');
  if (zonesVisible) { zoneLayer.addTo(map); btn.classList.add('active'); span.textContent='Ocultar zonas'; }
  else { map.removeLayer(zoneLayer); btn.classList.remove('active'); span.textContent='Mostrar zonas'; }
});

// ── Mobile sidebar toggle ──────────────────────────────────────────────────────
const sidebar    = document.getElementById('sidebar');
const mHandle    = document.getElementById('mobile-handle');
const sHeader    = document.getElementById('sidebar-header');

function isMobile() { return window.innerWidth <= 640; }

function toggleSidebar() {
  if (!isMobile()) return;
  sidebar.classList.toggle('open');
  map.invalidateSize();
}

mHandle.addEventListener('click', toggleSidebar);
sHeader.addEventListener('click', toggleSidebar);

// Auto-close sidebar when a bairro is selected on mobile
document.getElementById('bairro-list').addEventListener('click', () => {
  if (isMobile()) {
    setTimeout(() => { sidebar.classList.remove('open'); map.invalidateSize(); }, 150);
  }
});
